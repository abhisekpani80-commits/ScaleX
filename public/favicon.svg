<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a855f7;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#06b6d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ec4899;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0533;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#050508;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="url(#grad2)" />
  <!-- Outer ring with gradient -->
  <circle cx="50" cy="50" r="48" fill="none" stroke="url(#grad1)" stroke-width="2.5" />
  <!-- S letter -->
  <text
    x="50"
    y="68"
    font-family="Arial Black, sans-serif"
    font-size="58"
    font-weight="900"
    text-anchor="middle"
    fill="url(#grad1)"
    letter-spacing="-2"
  >S</text>
  <!-- Small X subscript -->
  <text
    x="70"
    y="75"
    font-family="Arial Black, sans-serif"
    font-size="24"
    font-weight="900"
    text-anchor="middle"
    fill="#06b6d4"
    opacity="0.85"
  >x</text>
</svg>
